services:
  # ===== MySQL 数据库 =====
  mysql:
    image: mysql:8.0
    container_name: grade-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: grade_management
      MYSQL_USER: grade_user
      MYSQL_PASSWORD: grade123456
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./sql/test-data.sql:/docker-entrypoint-initdb.d/02-test-data.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - grade-network

  # ===== Spring Boot 后端 =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grade-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/grade_management?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: grade_user
      SPRING_DATASOURCE_PASSWORD: grade123456
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SERVER_PORT: 8080
      SERVER_SERVLET_CONTEXT_PATH: /api
      TZ: Asia/Shanghai
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - grade-network

  # ===== Vue3 前端 =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: grade-frontend
    restart: unless-stopped
    ports:
      - "8088:80"
    depends_on:
      - backend
    networks:
      - grade-network

# ===== 网络 =====
networks:
  grade-network:
    driver: bridge

# ===== 数据卷 =====
volumes:
  mysql_data:
    driver: local
